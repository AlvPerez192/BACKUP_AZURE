# =============================================================================
# Destroy AWS RDS Test - destruye la RDS de prueba
# =============================================================================
# Requiere confirmacion explicita.
# =============================================================================

name: Destroy AWS RDS Test

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Escribe "destroy" para confirmar'
        required: true
        default: ''

env:
  AWS_REGION: eu-west-1
  TF_DIR: terraform/aws-test

jobs:
  destroy:
    name: terraform destroy (AWS test)
    runs-on: ubuntu-latest

    steps:
      - name: Validar confirmacion
        if: inputs.confirm != 'destroy'
        run: |
          echo "ERROR: Debes escribir 'destroy' en el input para confirmar"
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS Academy
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TFSTATE_BUCKET }}"

      - name: Terraform Destroy
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform destroy -auto-approve \
            -var="db_password=${{ secrets.DB_PASSWORD }}"

      - name: Resumen
        run: |
          echo "============================================"
          echo "RDS DE PRUEBA DESTRUIDA"
          echo "============================================"
